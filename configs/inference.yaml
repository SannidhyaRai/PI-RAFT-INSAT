# Inference and Evaluation Configuration for PI-RAFT AMV Pipeline

dataset:
  satellite: "GOES16"
  product: "ABI-L2-CMIPC"
  band: "C09"
  year: 2024
  day_of_year: 120
  val_hours: [18]
  crop_size: 512
  batch_size: 1

model:
  hidden_dim: 128
  corr_radius: 3
  checkpoint_path: "./model_checkpoints/PI_RAFT_epoch_3.pth"

inference:
  standard_iters: 4
  production_iters: 12
  visualize: true
  visualization_settings:
    stride: 16
    scale_factor: 0.1
    background_cmap: "twilight"
    flow_cmap: "jet"

export:
  output_dir: "./outputs/meteorological_outputs"
  filename: "INSAT_3DS_AMV_Derived_Wind.nc"
  title: "High-Resolution End-to-End Atmospheric Motion Vector (AMV) Matrix"
  institution: "Solutions & Engineering Team / India Meteorological Department (IMD) Collaboration"
  source: "INSAT-3DS Multi-Spectral Channel Processing Engine"
  history: "Generated via Physics-Informed Recurrent All-Pairs Field Transform (PI-RAFT) Pipeline"
